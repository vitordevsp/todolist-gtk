app-id: com.vitordevsp.TodoList
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: todolist-gtk
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-data/todolist-gtk:create

modules:
  - name: todolist-gtk
    buildsystem: simple
    build-commands:
      # Instalar o executável binário (do PyInstaller)
      - install -D todolist-gtk /app/bin/todolist-gtk
      # Instalar metadados de desktop
      - install -D data/com.vitordevsp.TodoList.desktop /app/share/applications/com.vitordevsp.TodoList.desktop
      - install -D data/com.vitordevsp.TodoList.svg /app/share/icons/hicolor/scalable/apps/com.vitordevsp.TodoList.svg
      - install -D data/com.vitordevsp.TodoList.metainfo.xml /app/share/metainfo/com.vitordevsp.TodoList.metainfo.xml
    sources:
      - type: dir
        path: .
